<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Survey result — EarnCord</title>
  <link rel="icon" type="image/png" href="earncord-mark.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="rail" aria-label="EarnCord">
      <a class="rail-brand" href="index.html" aria-label="EarnCord home">
        <img class="rail-mark" src="earncord-mark.png" width="28" height="28" alt="" />
        <span class="full">Earn<em>Cord</em></span>
        <span class="short">E<em>C</em></span>
      </a>
      <nav class="rail-nav">
        <a href="index.html"><span class="hash">#</span><span class="label">home</span></a>
      </nav>
      <p class="rail-footer">Not affiliated with Discord.</p>
    </aside>
    <div class="workspace">
      <header class="topbar">
        <div class="topbar-title"><span class="hash">#</span> survey-result</div>
        <div class="topbar-meta">session finished</div>
      </header>
      <main class="page-wrap">
        <p class="eyebrow" id="result-eyebrow">Survey</p>
        <h1 id="result-title" class="legal" style="margin:0 0 .75rem">Thanks</h1>
        <p id="result-body" style="color:var(--muted);max-width:40ch">You can close this tab and return to Discord.</p>
        <p class="account-meta" id="result-meta"></p>
        <p style="margin-top: 1.5rem">
          <a class="btn btn-connect" href="index.html" style="width: auto; display: inline-flex; padding-inline: 1.25rem">Back to EarnCord</a>
        </p>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const status = (params.get("status") || "").toLowerCase();
      const reward = params.get("reward");
      const dollars = params.get("reward_amount_in_dollars");
      const term = params.get("term_reason");
      const partial = params.get("partial_reward") === "true";

      const copy = {
        success: {
          eyebrow: partial ? "Partial reward" : "Complete",
          title: partial ? "Partial credit earned" : "Survey complete",
          body: "If the reward callback is live, credits will show in your EarnCord balance shortly.",
        },
        exit: {
          eyebrow: "Ended",
          title: "Survey ended",
          body: "No reward for this session. You can try another survey when one matches.",
        },
        screenout: {
          eyebrow: "Not a match",
          title: "Screened out",
          body: "This survey wasn’t a fit. That happens — your quality score still tracks completes vs screen-outs.",
        },
        quota: {
          eyebrow: "Full",
          title: "Survey full",
          body: "This survey hit its quota. Check back for new matches.",
        },
        security: {
          eyebrow: "Blocked",
          title: "Session blocked",
          body: "TheoremReach ended this session for a security or quality check. Contact support if this looks wrong.",
        },
      };

      const key =
        status === "success" || status === "done"
          ? "success"
          : status === "screenout" || status === "dq" || status === "disqualified"
            ? "screenout"
            : status === "quota"
              ? "quota"
              : status === "security"
                ? "security"
                : "exit";

      const c = copy[key];
      document.getElementById("result-eyebrow").textContent = c.eyebrow;
      document.getElementById("result-title").textContent = c.title;
      document.getElementById("result-body").textContent = c.body;

      const bits = [];
      if (reward) bits.push(`Reward: ${reward} credits`);
      if (dollars) bits.push(`≈ $${dollars}`);
      if (term) bits.push(`Reason: ${term}`);
      document.getElementById("result-meta").textContent = bits.join(" · ");
    })();
  </script>
</body>
</html>
