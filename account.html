<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account — EarnCord</title>
  <meta name="description" content="Your EarnCord Discord account." />
  <link rel="icon" href="mark.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="rail" aria-label="EarnCord">
      <a class="rail-brand" href="index.html" aria-label="EarnCord home">
        <svg class="rail-mark" viewBox="0 0 32 32" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="#0f121a"/>
          <path fill="#e8ebf2" d="M9 8h9v3h-6v3h5v3h-5v3h6v3H9z"/>
          <path fill="none" stroke="#5ef2a8" stroke-width="2.75" stroke-linecap="round" d="M19 8.5c5.2 0 8.5 3.2 8.5 7.5S24.2 23.5 19 23.5"/>
        </svg>
        <span class="full">Earn<em>Cord</em></span>
        <span class="short">E<em>C</em></span>
      </a>
      <nav class="rail-nav">
        <a href="index.html"><span class="hash">#</span><span class="label">home</span></a>
        <a href="account.html" aria-current="page"><span class="hash">#</span><span class="label">account</span></a>
      </nav>
      <p class="rail-footer">Not affiliated with Discord.</p>
    </aside>
    <div class="workspace">
      <header class="topbar">
        <div class="topbar-title"><span class="hash">#</span> account</div>
        <div class="topbar-meta">linked Discord profile</div>
      </header>
      <main class="page-wrap account-main">
        <h1>Account</h1>
        <p id="account-status" class="account-status">Checking session…</p>
        <div id="account-card" class="account-card" hidden>
          <img id="account-avatar" class="account-avatar" width="72" height="72" alt="" />
          <div>
            <p id="account-name" class="account-name"></p>
            <p id="account-user" class="account-meta"></p>
            <p class="account-meta">Discord ID: <code id="account-id"></code></p>
          </div>
          <button type="button" id="logout-btn" class="btn btn-ghost">Log out</button>
          <p class="account-note">
            You’re signed in on the web. Discord bot commands come next — same Discord account will link automatically.
          </p>
        </div>
      </main>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
